<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evan Rostel | The Resistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-red': '#8B0000',
                        'forest-green': '#013220',
                        'bright-green': '#22c55e',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="text-white min-h-screen relative overflow-x-hidden">

    <!-- Background Layer -->
    <div class="background-layer fixed inset-0 z-[-1]"></div>
    <div class="vignette-layer fixed inset-0 z-[-1] pointer-events-none"></div>

    <!-- Main Content -->
    <main class="w-full max-w-md mx-auto px-6 py-12 flex flex-col gap-8 items-center min-h-screen justify-center">

        <!-- Header / Profile Section -->
        <div class="w-full flex flex-col items-center text-center">

            <!-- Profile Image -->
            <div
                class="w-28 h-28 rounded-full p-1 bg-gradient-to-br from-white/20 to-transparent mb-6 profile-glow relative">
                <img src="profile.jpg" alt="Evan Rostel"
                    class="w-full h-full object-cover rounded-full border-2 border-white/10 shadow-2xl">
            </div>

            <h1 class="text-4xl font-extrabold tracking-tight mb-3 text-white drop-shadow-lg">
                Evan Rostel
            </h1>

            <p class="text-sm font-medium text-gray-300 mb-6 leading-relaxed max-w-xs">
                Helping You Learn AI The Right Way
            </p>

            <!-- Social Icons -->
            <div class="flex gap-4">
                <a href="https://www.instagram.com/rostelevan/#" target="_blank" rel="noopener noreferrer"
                    class="group p-3 bg-white/5 backdrop-blur-md rounded-full border border-white/10 hover:bg-white hover:border-white transition-all duration-300 shadow-lg">
                    <!-- Instagram Icon -->
                    <svg class="w-5 h-5 fill-white group-hover:fill-black transition-colors" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                    </svg>
                </a>
            </div>
        </div>

        <!-- "The Resistance" Brand Section -->
        <div class="flex items-center gap-4 w-full opacity-60 my-2">
            <div class="h-[1px] bg-white/20 flex-1"></div>
            <span class="text-white font-bold tracking-[0.2em] text-[10px] uppercase">Resistance</span>
            <div class="h-[1px] bg-white/20 flex-1"></div>
        </div>

        <!-- The Actions -->
        <div class="w-full flex flex-col gap-6">

            <!-- Card 1: Free Course (Green & Black Button) -->
            <div
                class="bg-white rounded-2xl overflow-hidden shadow-2xl flex flex-col p-4 gap-4 transform hover:scale-[1.01] transition-transform duration-300">

                <!-- Top Row: Image Left + Content Right -->
                <div class="flex flex-row gap-4 items-start">
                    <!-- Square Image Left (Active Group) -->
                    <div class="w-24 h-24 flex-shrink-0 rounded-lg overflow-hidden bg-gray-100 border border-gray-100">
                        <img src="running_group.jpg" alt="Active AI Group" class="w-full h-full object-cover">
                    </div>

                    <!-- Content Right -->
                    <div class="flex flex-col flex-1 gap-1">
                        <span class="text-lg font-black uppercase text-black tracking-tight leading-none mb-1">Free
                            Community</span>
                        <p class="text-gray-900 font-semibold text-xs leading-relaxed">
                            Free Community to learn about the new wave of AI
                        </p>
                    </div>
                </div>

                <!-- Bottom Row: Full Width Button -->
                <a href="https://t.me/TheResistance007" target="_blank" class="block w-full">
                    <button
                        class="w-full bg-bright-green hover:bg-green-600 text-black font-extrabold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95 uppercase tracking-wide text-sm">
                        Join group
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                        </svg>
                    </button>
                </a>
            </div>


            <!-- Card 2: AI Premium Group (Green & Black Button) -->
            <div class="relative transform hover:scale-[1.01] transition-transform duration-300 z-10">
                <!-- Wrapper for positioning outside elements -->
                <!-- Main Card Content -->
                <div class="bg-white rounded-2xl overflow-hidden shadow-2xl flex flex-col p-4 gap-4">

                    <!-- Top Row: Image Left + Content Right -->
                    <div class="flex flex-row gap-4 items-start">
                        <!-- Square Image Left (Bird Logo) -->
                        <div
                            class="w-24 h-24 flex-shrink-0 rounded-lg overflow-hidden bg-gray-50 flex items-center justify-center border border-gray-100">
                            <img src="bird_logo.png" alt="Phoenix Bird Logo" class="w-full h-full object-cover">
                        </div>

                        <!-- Content Right -->
                        <div class="flex flex-col flex-1 gap-1">
                            <span
                                class="text-lg font-black uppercase text-black tracking-tight leading-none mb-1">IDEM</span>
                            <p class="text-gray-900 font-semibold text-xs leading-relaxed">
                                Learn how to make money with AI latest skills While You Stay Behind the Camera
                            </p>
                        </div>
                    </div>

                    <!-- Bottom Row: Full Width Button -->
                    <a href="https://idem.vercel.app/index.html" class="block w-full">
                        <button
                            class="w-full bg-bright-green hover:bg-green-600 text-black font-extrabold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95 uppercase tracking-wide text-sm">
                            Get access
                        </button>
                    </a>
                </div>

            </div>

            <!-- Footer -->
            <footer class="mt-8 text-white/20 text-[10px] text-center font-light uppercase tracking-widest">
                &copy; 2024 The Resistance
            </footer>

    </main>

</body>

</html>
